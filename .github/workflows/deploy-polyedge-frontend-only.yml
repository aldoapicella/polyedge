name: Deploy PolyEdge frontend only

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

concurrency:
  group: polyedge-azure-control-plane
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-polyedge-dev
  APP_NAME: polyedge-dev
  SHADOW_APP: polyedge-shadow-neu
  ACR_NAME: crpolyedge6urdjr5nmwx7w
  ACR_LOGIN_SERVER: crpolyedge6urdjr5nmwx7w.azurecr.io
  CAMPAIGN_RUNTIME_SHA: d07fc1dc5ed31a5a1558909411a614f9e5f098f1
  GITHUB_DEPLOY_IDENTITY_NAME: id-github-polyedge-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, typecheck, and build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bind deployment to the expected identity and subscription
        run: |
          set -euo pipefail
          expected_client_id=$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$GITHUB_DEPLOY_IDENTITY_NAME" \
            --query clientId \
            -o tsv)
          authenticated_client_id=$(az account show --query user.name -o tsv)
          test "$(tr 'A-F' 'a-f' <<<"$authenticated_client_id")" = "$(tr 'A-F' 'a-f' <<<"$expected_client_id")"
          account_id=$(az account show --query id -o tsv)
          resource_group_id=$(az group show --name "$AZURE_RESOURCE_GROUP" --query id -o tsv)
          case "$resource_group_id" in
            "/subscriptions/$account_id/"*) ;;
            *) echo "Deployment subscription does not own $AZURE_RESOURCE_GROUP" >&2; exit 1 ;;
          esac

      - name: Freeze runtime state and prove funded controls are inactive
        id: safety
        run: |
          set -euo pipefail
          app_json=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME" \
            -o json)
          active_revision=$(jq -r '.properties.latestReadyRevisionName' <<<"$app_json")
          bot_image=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .image' <<<"$app_json")
          frontend_image=$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .image' <<<"$app_json")
          frontend_count=$(jq -r '[.properties.template.containers[] | select(.name == "frontend")] | length' <<<"$app_json")
          test -n "$active_revision"
          test -n "$bot_image"
          test -n "$frontend_image"
          test "$frontend_count" = "1"
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "EXECUTION_MODE") | .value' <<<"$app_json")" = "paper"
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "ALLOW_LIVE") | .value' <<<"$app_json")" = "false"

          shadow_json=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SHADOW_APP" \
            -o json)
          shadow_revision=$(jq -r '.properties.latestReadyRevisionName' <<<"$shadow_json")
          shadow_image=$(jq -r '.properties.template.containers[] | select(.name == "shadow-runtime") | .image' <<<"$shadow_json")
          test "$shadow_image" = "$ACR_LOGIN_SERVER/polyedge-rust-backend:$CAMPAIGN_RUNTIME_SHA"
          test "$(jq -r '.properties.template.containers[] | select(.name == "shadow-runtime") | .env[] | select(.name == "EXECUTION_MODE") | .value' <<<"$shadow_json")" = "paper"
          test "$(jq -r '.properties.template.containers[] | select(.name == "shadow-runtime") | .env[] | select(.name == "ALLOW_LIVE") | .value' <<<"$shadow_json")" = "false"
          test "$(jq -r '.properties.template.containers[] | select(.name == "shadow-runtime") | .env[] | select(.name == "PAPER_MAKER_FILL_POLICY") | .value' <<<"$shadow_json")" = "none"

          check_manual_job() {
            local job="$1"
            local enabled_name="$2"
            local expected="$3"
            local job_json running
            running=$(az containerapp job execution list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              --query "[?properties.status=='Running'] | length(@)" \
              -o tsv)
            test "$running" = "0"
            job_json=$(az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              -o json)
            test "$(jq -r '.properties.configuration.triggerType' <<<"$job_json")" = "Manual"
            test "$(jq -r --arg name "$enabled_name" '.properties.template.containers[0].env[] | select(.name == $name) | .value' <<<"$job_json")" = "$expected"
          }
          check_manual_job polyedge-venue-probe-neu-job VENUE_PROBE_DRY_RUN true
          check_manual_job polyedge-redeem-neu-job VENUE_REDEMPTION_ENABLED false
          check_manual_job polyedge-strategy-canary-neu-job STRATEGY_CANARY_CONTROLLER_ENABLED false
          check_manual_job polyedge-funded-ladder-neu-job FUNDED_LADDER_CONTROLLER_ENABLED false
          check_manual_job polyedge-promotion-neu-job PROMOTION_TRANSITION_ENABLED false
          check_manual_job polyedge-venue-model-job QUEUE_MODEL_TRAINING_ENABLED false

          echo "active_revision=$active_revision" >> "$GITHUB_OUTPUT"
          echo "bot_image=$bot_image" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$frontend_image" >> "$GITHUB_OUTPUT"
          echo "shadow_revision=$shadow_revision" >> "$GITHUB_OUTPUT"
          echo "shadow_image=$shadow_image" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable frontend image
        run: |
          set -euo pipefail
          image_tag="$GITHUB_SHA-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          tagged_image="$ACR_LOGIN_SERVER/polyedge-frontend:$image_tag"
          az acr login --name "$ACR_NAME"
          docker build -f Dockerfile.frontend -t "$tagged_image" .
          docker push "$tagged_image"
          digest=$(az acr manifest show-metadata \
            --registry "$ACR_NAME" \
            --name "polyedge-frontend:$image_tag" \
            --query digest \
            -o tsv)
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "FRONTEND_IMAGE=$ACR_LOGIN_SERVER/polyedge-frontend@$digest" >> "$GITHUB_ENV"

      - name: Update only the frontend container
        env:
          EXPECTED_BOT_IMAGE: ${{ steps.safety.outputs.bot_image }}
        run: |
          set -euo pipefail
          app_json=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME" \
            -o json)
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .image' <<<"$app_json")" = "$EXPECTED_BOT_IMAGE"
          check_manual_job() {
            local job="$1"
            local enabled_name="$2"
            local expected="$3"
            local job_json running
            running=$(az containerapp job execution list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              --query "[?properties.status=='Running'] | length(@)" \
              -o tsv)
            test "$running" = "0"
            job_json=$(az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              -o json)
            test "$(jq -r '.properties.configuration.triggerType' <<<"$job_json")" = "Manual"
            test "$(jq -r --arg name "$enabled_name" '.properties.template.containers[0].env[] | select(.name == $name) | .value' <<<"$job_json")" = "$expected"
          }
          check_manual_job polyedge-venue-probe-neu-job VENUE_PROBE_DRY_RUN true
          check_manual_job polyedge-redeem-neu-job VENUE_REDEMPTION_ENABLED false
          check_manual_job polyedge-strategy-canary-neu-job STRATEGY_CANARY_CONTROLLER_ENABLED false
          check_manual_job polyedge-funded-ladder-neu-job FUNDED_LADDER_CONTROLLER_ENABLED false
          check_manual_job polyedge-promotion-neu-job PROMOTION_TRANSITION_ENABLED false
          check_manual_job polyedge-venue-model-job QUEUE_MODEL_TRAINING_ENABLED false
          current_frontend_image=$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .image' <<<"$app_json")
          if [ "$current_frontend_image" != "$FRONTEND_IMAGE" ]; then
            az containerapp update \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$APP_NAME" \
              --container-name frontend \
              --image "$FRONTEND_IMAGE" \
              --output none
          fi

      - name: Verify runtime and campaign were not changed
        env:
          EXPECTED_ACTIVE_REVISION: ${{ steps.safety.outputs.active_revision }}
          EXPECTED_BOT_IMAGE: ${{ steps.safety.outputs.bot_image }}
          EXPECTED_FRONTEND_IMAGE: ${{ steps.safety.outputs.frontend_image }}
          EXPECTED_SHADOW_REVISION: ${{ steps.safety.outputs.shadow_revision }}
          EXPECTED_SHADOW_IMAGE: ${{ steps.safety.outputs.shadow_image }}
          DASHBOARD_AUTH_PASSWORD: ${{ secrets.DASHBOARD_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          rollout_ready=false
          for attempt in $(seq 1 30); do
            app_json=$(az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$APP_NAME" \
              -o json)
            active_revision=$(jq -r '.properties.latestReadyRevisionName' <<<"$app_json")
            current_frontend_image=$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .image' <<<"$app_json")
            if [ "$current_frontend_image" = "$FRONTEND_IMAGE" ] \
              && { [ "$EXPECTED_FRONTEND_IMAGE" = "$FRONTEND_IMAGE" ] || [ "$active_revision" != "$EXPECTED_ACTIVE_REVISION" ]; }; then
              rollout_ready=true
              break
            fi
            sleep 5
          done
          test "$rollout_ready" = true
          test -n "$active_revision"
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .image' <<<"$app_json")" = "$EXPECTED_BOT_IMAGE"
          test "$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .image' <<<"$app_json")" = "$FRONTEND_IMAGE"
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "EXECUTION_MODE") | .value' <<<"$app_json")" = "paper"
          test "$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "ALLOW_LIVE") | .value' <<<"$app_json")" = "false"

          shadow_json=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$SHADOW_APP" \
            -o json)
          test "$(jq -r '.properties.latestReadyRevisionName' <<<"$shadow_json")" = "$EXPECTED_SHADOW_REVISION"
          test "$(jq -r '.properties.template.containers[] | select(.name == "shadow-runtime") | .image' <<<"$shadow_json")" = "$EXPECTED_SHADOW_IMAGE"

          check_manual_job() {
            local job="$1"
            local enabled_name="$2"
            local expected="$3"
            local job_json running
            running=$(az containerapp job execution list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              --query "[?properties.status=='Running'] | length(@)" \
              -o tsv)
            test "$running" = "0"
            job_json=$(az containerapp job show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$job" \
              -o json)
            test "$(jq -r '.properties.configuration.triggerType' <<<"$job_json")" = "Manual"
            test "$(jq -r --arg name "$enabled_name" '.properties.template.containers[0].env[] | select(.name == $name) | .value' <<<"$job_json")" = "$expected"
          }
          check_manual_job polyedge-venue-probe-neu-job VENUE_PROBE_DRY_RUN true
          check_manual_job polyedge-redeem-neu-job VENUE_REDEMPTION_ENABLED false
          check_manual_job polyedge-strategy-canary-neu-job STRATEGY_CANARY_CONTROLLER_ENABLED false
          check_manual_job polyedge-funded-ladder-neu-job FUNDED_LADDER_CONTROLLER_ENABLED false
          check_manual_job polyedge-promotion-neu-job PROMOTION_TRANSITION_ENABLED false
          check_manual_job polyedge-venue-model-job QUEUE_MODEL_TRAINING_ENABLED false

          fqdn=$(jq -r '.properties.configuration.ingress.fqdn' <<<"$app_json")
          test -n "$fqdn"
          test -n "$DASHBOARD_AUTH_PASSWORD"
          login_body=$(jq -nc --arg password "$DASHBOARD_AUTH_PASSWORD" '{password:$password}')
          ready=false
          for attempt in $(seq 1 30); do
            code=$(curl -sS -o login.json -c cookies.txt -w '%{http_code}' \
              -H 'content-type: application/json' --data "$login_body" \
              "https://$fqdn/api/auth/login" || true)
            if [ "$code" = 200 ]; then
              ready=true
              break
            fi
            sleep 10
          done
          unset login_body
          test "$ready" = true
          curl --fail --silent --show-error -b cookies.txt \
            "https://$fqdn/api/backend/health" -o health.json
          jq -e '.ok == true and .backend_impl == "rust" and .execution_mode == "paper"' health.json
          status_ready=false
          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error -b cookies.txt \
              "https://$fqdn/api/backend/status" -o status.json
            if jq -e '.execution_mode == "paper" and .task_health.runtime_loop == "running" and .recorder_metrics.unrecovered_durable_events == 0 and .recorder_metrics.flush_unrecovered == false and .recorder_metrics.queued <= 1000 and .recorder_status.dropped_count == 0' status.json >/dev/null; then
              status_ready=true
              break
            fi
            sleep 5
          done
          test "$status_ready" = true
          curl --fail --silent --show-error -b cookies.txt \
            "https://$fqdn/api/backend/labs/venue-execution" -o labs-api.json
          jq -e '.queue_position_metric == "inferred_size_ahead" and .literal_fifo_rank_available == false' labs-api.json
          curl --fail --silent --show-error -b cookies.txt \
            "https://$fqdn/labs" -o labs.html
          az containerapp replica list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --revision "$active_revision" \
            -o json > replicas.json
          jq -e 'length > 0 and all(.[]; all(.properties.containers[]; (.restartCount // 0) == 0))' replicas.json

      - name: Publish deployment summary
        env:
          SHADOW_REVISION: ${{ steps.safety.outputs.shadow_revision }}
        run: |
          {
            echo "## PolyEdge frontend-only deployment"
            echo
            echo "- Frontend image: \`$FRONTEND_IMAGE\`"
            echo "- Active backend image: unchanged; app-wide revision rolled and passed recorder health checks"
            echo "- Frozen shadow revision: \`$SHADOW_REVISION\` (unchanged)"
            echo "- Funded execution: not targeted"
          } >> "$GITHUB_STEP_SUMMARY"
