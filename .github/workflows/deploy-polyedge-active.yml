          test "$(az role assignment list --scope "$storage_id" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Table Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$storage_id" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Table Data Contributor'] | length(@)" -o tsv)" = "0"
