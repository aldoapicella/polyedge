name: Deploy PolyEdge to Azure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-polyedge-dev
  AZURE_LOCATION: eastus
  APP_NAME: polyedge
  GITHUB_DEPLOY_IDENTITY_NAME: id-github-polyedge-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Test Rust workspace
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
          cargo build --release -p polyedge-cli
          research/test_run_shadow_daily.sh
          grep -Fq -- '--expected-runtime-role profitability_shadow' research/run_shadow_daily.sh
          grep -Fq -- '--expected-runtime-role primary' infra/main.bicep

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Install and test funded worker
        working-directory: venue-probe
        run: |
          npm ci
          npm test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group
        run: |
          az group show --name "$AZURE_RESOURCE_GROUP" --query name -o tsv

      - name: Validate required deployment secrets
        run: |
          test -n "${{ secrets.API_BEARER_TOKEN }}"
          test -n "${{ secrets.DASHBOARD_AUTH_PASSWORD }}"
          test -n "${{ secrets.DASHBOARD_SESSION_SECRET }}"

      - name: Resolve current images
        id: current_images
        run: |
          app="$APP_NAME-dev"
          if az containerapp show --resource-group "$AZURE_RESOURCE_GROUP" --name "$app" -o json > current_containerapp.json 2>/dev/null; then
            backend_image=$(jq -r ".properties.template.containers[]? | select(.name == \"bot\") | .image // empty" current_containerapp.json)
            frontend_image=$(jq -r ".properties.template.containers[]? | select(.name == \"frontend\") | .image // empty" current_containerapp.json)
          else
            backend_image="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
            frontend_image=""
          fi
          echo "backend_image=$backend_image" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$frontend_image" >> "$GITHUB_OUTPUT"

      - name: Bootstrap active infrastructure
        env:
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
          DASHBOARD_AUTH_PASSWORD: ${{ secrets.DASHBOARD_AUTH_PASSWORD }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.DASHBOARD_SESSION_SECRET }}
        run: |
          az deployment group create \
            --name "$APP_NAME-active-infra" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/polyedge-active.bicepparam \
            --parameters image="${{ steps.current_images.outputs.backend_image }}" frontendImage="${{ steps.current_images.outputs.frontend_image }}" apiBearerToken="${{ secrets.API_BEARER_TOKEN }}" dashboardAuthPassword="${{ secrets.DASHBOARD_AUTH_PASSWORD }}" dashboardSessionSecret="${{ secrets.DASHBOARD_SESSION_SECRET }}"

      - name: Read deployment outputs
        id: deploy_outputs
        run: |
          outputs=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME-active-infra" \
            --query properties.outputs)
          echo "acr_name=$(echo "$outputs" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$(echo "$outputs" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_fqdn=$(echo "$outputs" | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Grant workflow ACR push
        run: |
          principal_id=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name "$GITHUB_DEPLOY_IDENTITY_NAME" --query principalId -o tsv)
          expected_client_id=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name "$GITHUB_DEPLOY_IDENTITY_NAME" --query clientId -o tsv)
          authenticated_client_id=$(az account show --query user.name -o tsv)
          test "$(echo "$authenticated_client_id" | tr 'A-F' 'a-f')" = "$(echo "$expected_client_id" | tr 'A-F' 'a-f')"
          acr_id=$(az acr show \
            --name "${{ steps.deploy_outputs.outputs.acr_name }}" \
            --query id \
            -o tsv)
          az role assignment create \
            --assignee-object-id "$principal_id" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPush \
            --scope "$acr_id" \
            || true

      - name: Build and push images
        run: |
          az acr login --name "${{ steps.deploy_outputs.outputs.acr_name }}"
          backend_image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polyedge-rust-backend:${{ github.sha }}"
          frontend_image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polyedge-frontend:${{ github.sha }}"
          venue_probe_image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polyedge-venue-probe:${{ github.sha }}"
          docker build --build-arg GIT_SHA="${{ github.sha }}" -f Dockerfile.rust -t "$backend_image" .
          docker build -f Dockerfile.frontend -t "$frontend_image" .
          docker build -f Dockerfile.venue-probe -t "$venue_probe_image" .
          docker push "$backend_image"
          docker push "$frontend_image"
          docker push "$venue_probe_image"
          echo "BACKEND_IMAGE=$backend_image" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$frontend_image" >> "$GITHUB_ENV"
          echo "VENUE_PROBE_IMAGE=$venue_probe_image" >> "$GITHUB_ENV"

      - name: Deploy active images
        env:
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
          DASHBOARD_AUTH_PASSWORD: ${{ secrets.DASHBOARD_AUTH_PASSWORD }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.DASHBOARD_SESSION_SECRET }}
        run: |
          az deployment group create \
            --name "$APP_NAME-active-infra" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/polyedge-active.bicepparam \
            --parameters image="$BACKEND_IMAGE" frontendImage="$FRONTEND_IMAGE" venueProbeImage="$VENUE_PROBE_IMAGE" apiBearerToken="${{ secrets.API_BEARER_TOKEN }}" dashboardAuthPassword="${{ secrets.DASHBOARD_AUTH_PASSWORD }}" dashboardSessionSecret="${{ secrets.DASHBOARD_SESSION_SECRET }}"

      - name: Deploy North Europe evidence worker
        run: |
          az deployment group create \
            --name "$APP_NAME-venue-probe-neu" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/venue-probe.bicep \
            --parameters venueProbeImage="$VENUE_PROBE_IMAGE" backendImage="$BACKEND_IMAGE"

      - name: Pin prior, migrate evidence, and revoke legacy broad access
        run: |
          set -euo pipefail
          storage_name="stpolyedge6urdjr5nmwx7w"
          research_container="polyedge-research"
          funded_container="polyedge-funded-evidence"
          prior_file="research/configs/conservative_execution_prior_v1.json"
          prior_sha="91f29155d09f1a51f3354132befcbbb25d3f96b88c9a8a819f2304f4a7a28ed4"
          prior_blob="reports/research/venue-probe/models/conservative-execution-prior-v1-${prior_sha}.json"
          test "$(sha256sum "$prior_file" | cut -d' ' -f1)" = "$prior_sha"
          data_plane_ready=false
          for attempt in $(seq 1 30); do
            if az storage container show --account-name "$storage_name" --name bot-events --auth-mode login --only-show-errors -o none \
              && az storage container show --account-name "$storage_name" --name "$research_container" --auth-mode login --only-show-errors -o none \
              && az storage container show --account-name "$storage_name" --name "$funded_container" --auth-mode login --only-show-errors -o none; then
              data_plane_ready=true
              break
            fi
            sleep 10
          done
          test "$data_plane_ready" = "true"
          exists=$(az storage blob exists --account-name "$storage_name" --container-name "$research_container" --name "$prior_blob" --auth-mode login --query exists -o tsv)
          if [ "$exists" = "true" ]; then
            az storage blob download --account-name "$storage_name" --container-name "$research_container" --name "$prior_blob" --file pinned-prior.json --auth-mode login --overwrite --only-show-errors -o none
            test "$(sha256sum pinned-prior.json | cut -d' ' -f1)" = "$prior_sha"
          else
            az storage blob upload --account-name "$storage_name" --container-name "$research_container" --name "$prior_blob" --file "$prior_file" --auth-mode login --overwrite false --content-type application/json --metadata sha256="$prior_sha" immutable_content="true" --only-show-errors -o none
          fi
          storage_id=$(az storage account show --resource-group "$AZURE_RESOURCE_GROUP" --name "$storage_name" --query id -o tsv)
          migration_manifest_blob="migration/bot-events-venue-probe-v1.manifest.json"
          migrated=$(az storage blob exists --account-name "$storage_name" --container-name "$funded_container" --name "$migration_manifest_blob" --auth-mode login --query exists -o tsv)
          if [ "$migrated" != "true" ]; then
            az storage blob list --account-name "$storage_name" --container-name bot-events --prefix "reports/research/venue-probe/" --auth-mode login -o json | jq '[.[].name] | sort' > migration-source-names.json
            source_count=$(jq 'length' migration-source-names.json)
            test "$source_count" -gt "0"
            : > migration-hashes.ndjson
            while IFS= read -r blob; do
              az storage blob download --account-name "$storage_name" --container-name bot-events --name "$blob" --file migration-source.bin --auth-mode login --overwrite --only-show-errors -o none
              source_sha=$(sha256sum migration-source.bin | cut -d' ' -f1)
              destination_exists=$(az storage blob exists --account-name "$storage_name" --container-name "$funded_container" --name "$blob" --auth-mode login --query exists -o tsv)
              if [ "$destination_exists" != "true" ]; then
                az storage blob upload --account-name "$storage_name" --container-name "$funded_container" --name "$blob" --file migration-source.bin --auth-mode login --overwrite false --only-show-errors -o none
              fi
              az storage blob download --account-name "$storage_name" --container-name "$funded_container" --name "$blob" --file migration-destination.bin --auth-mode login --overwrite --only-show-errors -o none
              destination_sha=$(sha256sum migration-destination.bin | cut -d' ' -f1)
              test "$source_sha" = "$destination_sha"
              jq -nc --arg name "$blob" --arg sha256 "sha256:$source_sha" '{name:$name,sha256:$sha256}' >> migration-hashes.ndjson
            done < <(jq -r '.[]' migration-source-names.json)
            az storage blob list --account-name "$storage_name" --container-name "$funded_container" --prefix "reports/research/venue-probe/" --auth-mode login -o json | jq '[.[].name] | sort' > migration-destination-names.json
            test "$(jq -n --slurpfile source migration-source-names.json --slurpfile destination migration-destination-names.json '$source[0] - $destination[0] | length')" = "0"
            jq -s --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '{schema:"polyedge.storage_migration_manifest.v1",source_container:"bot-events",destination_container:"polyedge-funded-evidence",generated_at:$generated_at,artifacts:.}' migration-hashes.ndjson > migration-manifest.json
            migration_manifest_sha=$(sha256sum migration-manifest.json | cut -d' ' -f1)
            az storage blob upload --account-name "$storage_name" --container-name "$funded_container" --name "$migration_manifest_blob" --file migration-manifest.json --auth-mode login --overwrite false --content-type application/json --metadata sha256="$migration_manifest_sha" --only-show-errors -o none
          fi
          az storage blob download --account-name "$storage_name" --container-name "$funded_container" --name "$migration_manifest_blob" --file migration-manifest-verified.json --auth-mode login --overwrite --only-show-errors -o none
          migration_manifest_sha=$(sha256sum migration-manifest-verified.json | cut -d' ' -f1)
          test "$(az storage blob show --account-name "$storage_name" --container-name "$funded_container" --name "$migration_manifest_blob" --auth-mode login --query metadata.sha256 -o tsv)" = "$migration_manifest_sha"
          test "$(jq -r '.schema' migration-manifest-verified.json)" = "polyedge.storage_migration_manifest.v1"
          test "$(jq -r '.source_container' migration-manifest-verified.json)" = "bot-events"
          test "$(jq -r '.destination_container' migration-manifest-verified.json)" = "polyedge-funded-evidence"
          test "$(jq '.artifacts | length' migration-manifest-verified.json)" -gt "0"
          while IFS=$'\t' read -r blob expected_sha; do
            az storage blob download --account-name "$storage_name" --container-name "$funded_container" --name "$blob" --file migration-destination.bin --auth-mode login --overwrite --only-show-errors -o none
            test "sha256:$(sha256sum migration-destination.bin | cut -d' ' -f1)" = "$expected_sha"
          done < <(jq -r '.artifacts[] | [.name,.sha256] | @tsv' migration-manifest-verified.json)
          shadow_principal=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-shadow-neu-id --query principalId -o tsv)
          funded_principal=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-neu-id --query principalId -o tsv)
          app_principal=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-dev-id --query principalId -o tsv)
          model_principal=$(az identity show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-dev-venue-model-id --query principalId -o tsv)
          key_vault_id=$(az keyvault show --resource-group "$AZURE_RESOURCE_GROUP" --name kvpolyedge6urdjr5nmwx7w --query id -o tsv)
          bot_events_scope="$storage_id/blobServices/default/containers/bot-events"
          az role assignment delete --assignee "$shadow_principal" --role "Storage Blob Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$shadow_principal" --role "Storage Table Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$funded_principal" --role "Storage Blob Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$funded_principal" --role "Storage Table Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$app_principal" --role "Storage Blob Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$app_principal" --role "Storage Table Data Contributor" --scope "$storage_id" || true
          az role assignment delete --assignee "$app_principal" --role "Key Vault Secrets User" --scope "$key_vault_id" || true
          az role assignment delete --assignee "$funded_principal" --role "Key Vault Secrets User" --scope "$key_vault_id" || true
          az role assignment delete --assignee "$model_principal" --role "Storage Blob Data Contributor" --scope "$bot_events_scope" || true

      - name: Verify active writer configuration
        run: |
          app="${{ steps.deploy_outputs.outputs.container_app_name }}"
          az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$app" \
            -o json > containerapp.json
          run_on_startup=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "RUN_BOT_ON_STARTUP") | .value' containerapp.json)
          azure_client_id=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "AZURE_CLIENT_ID") | .value' containerapp.json)
          backend_base=$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .env[] | select(.name == "BACKEND_API_BASE_URL") | .value' containerapp.json)
          dashboard_secret=$(jq -r '.properties.template.containers[] | select(.name == "frontend") | .env[] | select(.name == "DASHBOARD_SESSION_SECRET") | .secretRef' containerapp.json)
          research_container=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "AZURE_RESEARCH_STORAGE_CONTAINER_NAME") | .value' containerapp.json)
          funded_container=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "AZURE_FUNDED_STORAGE_CONTAINER_NAME") | .value' containerapp.json)
          model_container=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "AZURE_MODEL_STORAGE_CONTAINER_NAME") | .value' containerapp.json)
          event_index_types=$(jq -r '.properties.template.containers[] | select(.name == "bot") | .env[] | select(.name == "AZURE_EVENT_INDEX_TYPES") | .value' containerapp.json)
          test "$run_on_startup" = "true"
          test -n "$azure_client_id"
          test "$backend_base" = "http://127.0.0.1:8081/api/v1"
          test "$dashboard_secret" = "dashboard-session-secret"
          test "$research_container" = "polyedge-research"
          test "$funded_container" = "polyedge-funded-evidence"
          test "$model_container" = "polyedge-models"
          test "$(echo "$event_index_types" | grep -c 'runtime_provenance')" = "1"
          test "$(jq -r '[.properties.template.containers[] | .env[]? | select(.name == "AZURE_STORAGE_ACCOUNT_KEY")] | length' containerapp.json)" = "0"
          test "$(jq -r '[(.properties.configuration.secrets // [])[] | select(.name == "storage-account-key")] | length' containerapp.json)" = "0"
          for research_job_name in polyedge-data-freshness-job polyedge-hourly-quality-job polyedge-daily-research-job polyedge-prospective-job polyedge-replay-index-job polyedge-chart-backfill-job polyedge-adx-ingestion-job polyedge-backfill-job; do
            research_job=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name "$research_job_name" -o json)
            test "$(echo "$research_job" | jq -r '[.properties.template.containers[] | .env[]? | select(.name == "AZURE_STORAGE_ACCOUNT_KEY")] | length')" = "0"
            test "$(echo "$research_job" | jq -r '[(.properties.configuration.secrets // [])[] | select(.name == "storage-account-key")] | length')" = "0"
          done
          venue_model_job=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-model-job -o json)
          test "$(echo "$venue_model_job" | jq -r '.properties.configuration.triggerType')" = "Manual"
          test "$(echo "$venue_model_job" | jq -r '.properties.configuration.replicaRetryLimit')" = "0"
          test "$(echo "$venue_model_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "QUEUE_MODEL_TRAINING_ENABLED") | .value')" = "false"
          test "$(echo "$venue_model_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "QUEUE_MODEL_SOURCE_CONTAINER_NAME") | .value')" = "polyedge-funded-evidence"
          test "$(echo "$venue_model_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "QUEUE_MODEL_OUTPUT_CONTAINER_NAME") | .value')" = "polyedge-models"
          test "$(echo "$venue_model_job" | jq -r '[.properties.template.containers[0].env[] | select(.name | test("^QUEUE_MODEL_CHECKPOINT_(BLOB_NAME|SHA256)$")) | .value == ""] | all')" = "true"
          test "$(echo "$venue_model_job" | jq -r '(.properties.configuration.secrets // []) | length')" = "0"
          probe_dry_run=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-probe-neu-job --query "properties.template.containers[0].env[?name=='VENUE_PROBE_DRY_RUN'].value | [0]" -o tsv)
          probe_country=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-probe-neu-job --query "properties.template.containers[0].env[?name=='VENUE_PROBE_EXPECTED_COUNTRY'].value | [0]" -o tsv)
          probe_location=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-probe-neu-job --query location -o tsv)
          probe_container=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-venue-probe-neu-job --query "properties.template.containers[0].env[?name=='AZURE_STORAGE_CONTAINER_NAME'].value | [0]" -o tsv)
          test "$probe_dry_run" = "true"
          test "$probe_country" = "IE"
          test "$probe_location" = "North Europe"
          test "$probe_container" = "polyedge-funded-evidence"
          canary_job=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-strategy-canary-neu-job -o json)
          test "$(echo "$canary_job" | jq -r '.location')" = "North Europe"
          test "$(echo "$canary_job" | jq -r '.properties.configuration.triggerType')" = "Manual"
          test "$(echo "$canary_job" | jq -r '.properties.configuration.replicaRetryLimit')" = "0"
          test "$(echo "$canary_job" | jq -r '.properties.configuration.manualTriggerConfig.parallelism')" = "1"
          test "$(echo "$canary_job" | jq -r '.properties.configuration.scheduleTriggerConfig == null')" = "true"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].command | join(" ")')" = "node src/canary-controller.mjs"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "STRATEGY_CANARY_DRY_RUN") | .value')" = "true"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "STRATEGY_CANARY_CONTROLLER_ENABLED") | .value')" = "false"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "ALLOW_STRATEGY_CANARY") | .value')" = "false"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "ALLOW_LIVE") | .value')" = "false"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "ENABLE_TAKER_ORDERS") | .value')" = "false"
          test "$(echo "$canary_job" | jq -r '[.properties.template.containers[0].env[] | select(.name | test("^STRATEGY_CANARY_(INTENT|PROMOTION_MANIFEST|AUTHORIZATION)_(BLOB_NAME|SHA256)$"))] | length')" = "6"
          test "$(echo "$canary_job" | jq -r '[.properties.template.containers[0].env[] | select(.name | test("^STRATEGY_CANARY_(INTENT|PROMOTION_MANIFEST|AUTHORIZATION)_(BLOB_NAME|SHA256)$")) | .value == ""] | all')" = "true"
          test "$(echo "$canary_job" | jq -r '[.properties.template.containers[0].env[] | select(.name | test("^STRATEGY_CANARY_HUMAN_GRANT_(BLOB_NAME|SHA256)$"))] | length')" = "2"
          test "$(echo "$canary_job" | jq -r '[.properties.template.containers[0].env[] | select(.name | test("^STRATEGY_CANARY_HUMAN_GRANT_(BLOB_NAME|SHA256)$")) | .value == ""] | all')" = "true"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "STRATEGY_CANARY_INTENT_CONTAINER_NAME") | .value')" = "polyedge-shadow-events"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "STRATEGY_CANARY_MANIFEST_CONTAINER_NAME") | .value')" = "polyedge-research"
          test "$(echo "$canary_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "AZURE_STORAGE_CONTAINER_NAME") | .value')" = "polyedge-funded-evidence"
          funded_ladder_job=$(az containerapp job show --resource-group "$AZURE_RESOURCE_GROUP" --name polyedge-funded-ladder-neu-job -o json)
          test "$(echo "$funded_ladder_job" | jq -r '.location')" = "North Europe"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.configuration.triggerType')" = "Manual"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.configuration.replicaRetryLimit')" = "0"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.configuration.scheduleTriggerConfig == null')" = "true"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.template.containers[0].command | join(" ")')" = "node src/funded-ladder-controller.mjs"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "FUNDED_LADDER_CONTROLLER_ENABLED") | .value')" = "false"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "ALLOW_FUNDED_LADDER") | .value')" = "false"
          test "$(echo "$funded_ladder_job" | jq -r '.properties.template.containers[0].env[] | select(.name == "FUNDED_LADDER_DRY_RUN") | .value')" = "true"
