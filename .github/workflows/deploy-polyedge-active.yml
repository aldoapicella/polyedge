          test "$(az role assignment list --scope "$key_vault_id" --assignee "$promotion_transition_principal" --include-inherited --query 'length(@)' -o tsv)" = "0"
          test "$(az role assignment list --scope "$key_vault_id" --assignee "$funded_principal" --include-inherited --query 'length(@)' -o tsv)" = "0"
          for secret_name in polymarket-private-key polymarket-api-key polymarket-api-secret polymarket-api-passphrase; do
