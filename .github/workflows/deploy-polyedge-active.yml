          model_principal=$(echo "$model_identity" | jq -r '.principalId')
          promotion_transition_principal=$(echo "$promotion_transition_identity" | jq -r '.principalId')
          github_deploy_principal=$(echo "$github_deploy_identity" | jq -r '.principalId')
          shadow_identity_id=$(echo "$shadow_identity" | jq -r '.id')
          shadow_research_identity_id=$(echo "$shadow_research_identity" | jq -r '.id')
          promotion_transition_identity_id=$(echo "$promotion_transition_identity" | jq -r '.id')
          test -n "$funded_principal"
          test -n "$shadow_principal"
          test "$funded_principal" != "$shadow_principal"
          test "$funded_principal" != "$shadow_research_principal"
          test "$shadow_principal" != "$shadow_research_principal"
          test "$app_principal" != "$funded_principal"
          test "$model_principal" != "$funded_principal"
          test "$model_principal" != "$app_principal"
          test "$promotion_transition_principal" != "$funded_principal"
          test "$promotion_transition_principal" != "$app_principal"
          test "$(echo "$shadow_json" | jq -r --arg id "$shadow_identity_id" '.identity.userAssignedIdentities | keys == [$id]')" = "true"
          test "$(echo "$shadow_job" | jq -r --arg id "$shadow_research_identity_id" '.identity.userAssignedIdentities | keys == [$id]')" = "true"
          test "$(echo "$promotion_transition_job" | jq -r --arg id "$promotion_transition_identity_id" '.identity.userAssignedIdentities | keys == [$id]')" = "true"
          key_vault_id=$(az keyvault show --resource-group "$AZURE_RESOURCE_GROUP" --name kvpolyedge6urdjr5nmwx7w --query id -o tsv)
          shadow_key_vault_roles=$(az role assignment list --scope "$key_vault_id" --assignee "$shadow_principal" --include-inherited --query 'length(@)' -o tsv)
          test "$shadow_key_vault_roles" = "0"
          shadow_research_key_vault_roles=$(az role assignment list --scope "$key_vault_id" --assignee "$shadow_research_principal" --include-inherited --query 'length(@)' -o tsv)
          test "$shadow_research_key_vault_roles" = "0"
          test "$(az role assignment list --scope "$key_vault_id" --assignee "$app_principal" --include-inherited --query 'length(@)' -o tsv)" = "0"
