          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$model_scope" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$research_scope" --assignee "$shadow_research_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$shadow_events_scope" --assignee "$shadow_research_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$shadow_principal" --query 'length(@)' -o tsv)" = "0"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$shadow_research_principal" --query 'length(@)' -o tsv)" = "0"
          test "$(az role assignment list --scope "$storage_id" --assignee "$funded_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$funded_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$research_scope" --assignee "$funded_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$shadow_events_scope" --assignee "$funded_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$funded_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$storage_id" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$research_scope" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$app_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$model_principal" --query 'length(@)' -o tsv)" = "0"
          test "$(az role assignment list --scope "$storage_id" --assignee "$model_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$model_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$model_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$research_scope" --assignee "$promotion_transition_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$promotion_transition_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$promotion_transition_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$storage_id" --assignee "$promotion_transition_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$github_deploy_principal" --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$research_scope" --assignee "$github_deploy_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$github_deploy_principal" --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          # Effective-role assertions include parent/RG/subscription grants, so
          # an inherited broad role cannot hide behind the direct-scope checks.
          test "$(az role assignment list --scope "$shadow_events_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$model_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Reader'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$model_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$funded_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$funded_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$app_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$app_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$model_scope" --assignee "$model_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$model_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"
          test "$(az role assignment list --scope "$funded_evidence_scope" --assignee "$promotion_transition_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "1"
          test "$(az role assignment list --scope "$bot_events_scope" --assignee "$promotion_transition_principal" --include-inherited --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" -o tsv)" = "0"

          # The app identity backs the API and research jobs. Its complete Table
          # Contributor scope set must exactly match the tables exported by the
          # deployed main.bicep template: no account/parent grant and no extra
          # table grant anywhere in the subscription.
          deployment_outputs=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME-active-infra" \
            --query properties.outputs \
            -o json)
          mapfile -t app_table_names < <(echo "$deployment_outputs" | jq -r \
            '[.storageTableName.value, .chartTableName.value, .marketTableName.value] + .labTableNames.value | unique[]')
          test "${#app_table_names[@]}" -gt "0"
          : > expected-app-table-scopes.txt
          for table in "${app_table_names[@]}"; do
            echo "$storage_id/tableServices/default/tables/$table" | tr '[:upper:]' '[:lower:]' >> expected-app-table-scopes.txt
          done
          sort -u -o expected-app-table-scopes.txt expected-app-table-scopes.txt
          test "$(wc -l < expected-app-table-scopes.txt)" = "${#app_table_names[@]}"
          az role assignment list --assignee "$app_principal" --all -o json \
            | jq -r '.[] | select(.roleDefinitionName == "Storage Table Data Contributor") | .scope | ascii_downcase' \
            | sort > actual-app-table-scopes.txt
          diff -u expected-app-table-scopes.txt actual-app-table-scopes.txt

          table_scope_prefix=$(echo "$storage_id/tableServices/default/tables/" | tr '[:upper:]' '[:lower:]')
          az rest \
            --method get \
            --url "https://management.azure.com${storage_id}/tableServices/default/tables?api-version=2023-05-01" \
            -o json \
            | jq -r --arg prefix "$table_scope_prefix" \
              '.value[] | (.id | ascii_downcase) as $id | select($id | startswith($prefix)) | $id' \
            | sort -u > existing-app-account-table-scopes.txt
          while IFS= read -r expected_scope; do
            grep -Fqx "$expected_scope" existing-app-account-table-scopes.txt
          done < expected-app-table-scopes.txt
          while IFS= read -r table_scope; do
            effective_count=$(az role assignment list \
              --scope "$table_scope" \
              --assignee "$app_principal" \
              --include-inherited \
              --query "[?roleDefinitionName=='Storage Table Data Contributor'] | length(@)" \
              -o tsv)
            if grep -Fqx "$table_scope" expected-app-table-scopes.txt; then
              test "$effective_count" = "1"
            else
              test "$effective_count" = "0"
            fi
          done < existing-app-account-table-scopes.txt

          for table in ShadowBotEventIndex ShadowBotChartSeries ShadowBotMarketCatalog; do
            table_scope="$storage_id/tableServices/default/tables/$table"
            test "$(az role assignment list --scope "$table_scope" --assignee "$shadow_principal" --query "[?roleDefinitionName=='Storage Table Data Contributor'] | length(@)" -o tsv)" = "1"
            test "$(az role assignment list --scope "$table_scope" --assignee "$shadow_principal" --include-inherited --query "[?roleDefinitionName=='Storage Table Data Contributor'] | length(@)" -o tsv)" = "1"
          done

      - name: Authenticated post-deploy smoke and paper probe
        env:
          DASHBOARD_AUTH_PASSWORD: ${{ secrets.DASHBOARD_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          app="${{ steps.deploy_outputs.outputs.container_app_name }}"
          fqdn="${{ steps.deploy_outputs.outputs.container_app_fqdn }}"
          login_body=$(jq -nc --arg password "$DASHBOARD_AUTH_PASSWORD" '{password:$password}')
          ready=false
          for attempt in $(seq 1 30); do
            code=$(curl -sS -o login.json -c cookies.txt -w '%{http_code}' \
              -H 'content-type: application/json' --data "$login_body" \
              "https://$fqdn/api/auth/login" || true)
            if [ "$code" = 200 ]; then
              ready=true
              break
            fi
            sleep 10
          done
          unset login_body
          test "$ready" = true
          for path in health snapshot markets/current orders fills decisions reports/latest; do
            curl --fail --silent --show-error -b cookies.txt \
              "https://$fqdn/api/backend/$path" -o "smoke-${path//\//-}.json"
          done
          jq -e '.ok == true and .backend_impl == "rust" and .execution_mode == "paper"' smoke-health.json
          status_ready=false
          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error -b cookies.txt \
              "https://$fqdn/api/backend/status" -o smoke-status.json
            if jq -e '.execution_mode == "paper" and .task_health.runtime_loop == "running" and .recorder_metrics.failed_total == 0 and .recorder_metrics.queued <= 1000 and .recorder_status.dropped_count == 0 and .recorder_status.error_count == 0' smoke-status.json >/dev/null; then
              status_ready=true
              break
            fi
            sleep 5
          done
          if [ "$status_ready" != true ]; then
            jq '{execution_mode, task_health, recorder_metrics, recorder_status}' smoke-status.json
            exit 1
          fi
          curl --fail --silent --show-error -b cookies.txt -X POST \
            "https://$fqdn/api/backend/execution-quality/probe" -o probe.json
          jq -e '.status == "pass" and .venue_contacted == false and .live_order_placed == false and .markout_1s == 2 and .markout_5s == 2 and .markout_30s == 2' probe.json
          jq -e --arg expected_sha "${{ github.sha }}" '.git_sha == $expected_sha' smoke-status.json
          revision=$(az containerapp show --resource-group "$AZURE_RESOURCE_GROUP" --name "$app" --query properties.latestReadyRevisionName -o tsv)
          az containerapp replica list --resource-group "$AZURE_RESOURCE_GROUP" --name "$app" --revision "$revision" -o json > replicas.json
          jq -e 'length > 0 and all(.[]; all(.properties.containers[]; (.restartCount // 0) == 0))' replicas.json

      - name: Print endpoint
        run: |
          echo "https://${{ steps.deploy_outputs.outputs.container_app_fqdn }}"
