          done
          dashboard_secret_scope="$key_vault_id/secrets/dashboard-auth-password"
          test "$(az role assignment list --scope "$dashboard_secret_scope" --assignee "$funded_principal" --query 'length(@)' -o tsv)" = "0"
          storage_id=$(az storage account show --resource-group "$AZURE_RESOURCE_GROUP" --name stpolyedge6urdjr5nmwx7w --query id -o tsv)
