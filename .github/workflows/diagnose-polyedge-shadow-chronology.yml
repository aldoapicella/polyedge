name: Diagnose PolyEdge shadow chronology

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type campaign-2026-07-23-lossdiag-v2-read-only
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-polyedge-dev
  VALIDATION_JOB: polyedge-shadow-val-neu-job
  VALIDATION_CONTAINER: polyedge-research-validation
  VALIDATION_IMAGE: crpolyedge6urdjr5nmwx7w.azurecr.io/polyedge-rust-research-validation@sha256:6c1ead374deef71a80537ee7d14abe1d1347d02d16dfce98bbe4f71f70d22992
  CACHE_ROOT: data/research/shadow/campaign-2026-07-23-lossdiag-v2/projected-cache
  BATCH_ID: strategy-batch-019b2df9e8220ff60a3b9860cf8fab00660d737b93649909b8732c16d6284b68
  OUTPUT_INDEX: "0"
  EXPECTED_RAW_SOURCE_INVENTORY_SHA256: sha256:f74a9e80b5d7178ab811e9b7d3822985e334823917f43a0cccdcb15c2026a565
  REQUIRED_REPAIR_SHA: d8be68c2c5b46b9ba0cfbc283e0061da022355e1
  REPAIR_PARENT_SHA: 06a699dbebef5765fe29e3a16dce909d5148fd26

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm fixed diagnostic scope
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = "campaign-2026-07-23-lossdiag-v2-read-only"
          git merge-base --is-ancestor "$REQUIRED_REPAIR_SHA" HEAD
          while IFS= read -r path; do
            case "$path" in
              .github/workflows/diagnose-polyedge-shadow-chronology.yml|\
              .github/workflows/validate-polyedge-shadow-lossdiag.yml|\
              Dockerfile.research-validation|\
              crates/polyedge-reporting/src/research/loss_diagnostics.rs|\
              infra/shadow-lossdiag-validation.bicep|\
              research/configs/shadow_lossdiag_validation_2026-07-23_v2.json|\
              research/run_shadow_lossdiag_validation.sh|\
              research/test_shadow_lossdiag_validation.sh) ;;
              *)
                echo "Diagnostic revision contains an out-of-scope change: $path" >&2
                exit 1
                ;;
            esac
          done < <(git diff --name-only "$REPAIR_PARENT_SHA"...HEAD)

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Freeze isolated manual job
        id: freeze
        run: |
          set -euo pipefail
          job=$(az containerapp job show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$VALIDATION_JOB" \
            -o json)
          test "$(jq -r '.properties.configuration.triggerType' <<<"$job")" = "Manual"
          test "$(jq -r '.properties.configuration.replicaRetryLimit' <<<"$job")" = "0"
          test "$(jq -r '.properties.configuration.manualTriggerConfig.parallelism' <<<"$job")" = "1"
          test "$(jq -r '.properties.configuration.manualTriggerConfig.replicaCompletionCount' <<<"$job")" = "1"
          test "$(jq -r '.properties.template.containers | length' <<<"$job")" = "1"
          test "$(jq -r '.properties.template.containers[0].image' <<<"$job")" = "$VALIDATION_IMAGE"
          test "$(jq -r '(.properties.configuration.secrets // []) | length' <<<"$job")" = "0"
          test "$(jq -r '[.properties.template.containers[0].env[].name | select(test("POLYMARKET_(PRIVATE_KEY|API_KEY|API_SECRET|API_PASSPHRASE)"))] | length' <<<"$job")" = "0"
          azure_client_id="$(jq -r '.properties.template.containers[0].env[] | select(.name == "AZURE_CLIENT_ID") | .value' <<<"$job")"
          test "$(jq -nr --arg value "$azure_client_id" '$value | test("^[0-9a-fA-F-]{36}$")')" = "true"
          for pair in EXECUTION_MODE=paper ALLOW_LIVE=false RUN_BOT_ON_STARTUP=false ENABLE_TAKER_ORDERS=false; do
            name=${pair%%=*}
            value=${pair#*=}
            test "$(jq -r --arg name "$name" '.properties.template.containers[0].env[] | select(.name == $name) | .value' <<<"$job")" = "$value"
          done
          test "$(az containerapp job execution list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$VALIDATION_JOB" \
            --query "[?properties.status=='Running'] | length(@)" -o tsv)" = "0"
          template_sha="sha256:$(jq -cS \
            '{identity,configuration:.properties.configuration,template:.properties.template}' \
            <<<"$job" | sha256sum | cut -d' ' -f1)"
          echo "template_sha=$template_sha" >> "$GITHUB_OUTPUT"
          echo "azure_client_id=$azure_client_id" >> "$GITHUB_OUTPUT"

      - name: Start one ephemeral read-only extraction
        id: execution
        env:
          AZURE_CLIENT_ID: ${{ steps.freeze.outputs.azure_client_id }}
        run: |
          set -euo pipefail
          diagnostic_script=$(cat <<'SCRIPT'
          set -eu
          root=/tmp/polyedge-chronology
          campaign="$root/campaign"
          mkdir -p "$root"
          polyedge-rs research materialize-projected-campaign \
            --since 2026-07-23 \
            --through 2026-07-23 \
            --campaign-id campaign-2026-07-23 \
            --cache-root "azure://stpolyedge6urdjr5nmwx7w/polyedge-research-validation/data/research/shadow/campaign-2026-07-23-lossdiag-v2/projected-cache" \
            --out "$campaign" \
            --manifest "$root/campaign-manifest.json" \
            --require-azure-source true \
            --expected-source-container polyedge-shadow-events >/dev/null
          test "$(jq -r '.schema_version' "$root/campaign-manifest.json")" = "2"
          test "$(jq -r '.segments | length' "$root/campaign-manifest.json")" = "1"
          test "$(jq -r '.segments[0].raw_source_inventory_sha256' "$root/campaign-manifest.json")" = \
            "sha256:f74a9e80b5d7178ab811e9b7d3822985e334823917f43a0cccdcb15c2026a565"

          other="$campaign/segments/2026-07-23/other.jsonl.gz"
          decisions="$campaign/segments/2026-07-23/decisions.jsonl.gz"
          batch_id="strategy-batch-019b2df9e8220ff60a3b9860cf8fab00660d737b93649909b8732c16d6284b68"
          output_index=0
          gzip -cd "$other" |
            jq -c --arg batch "$batch_id" '
              select(.event_type == "strategy_decision_batch" and .raw_payload.batch_id == $batch)
            ' >"$root/batch.jsonl"
          gzip -cd "$decisions" |
            jq -c --arg batch "$batch_id" --argjson index "$output_index" '
              select(
                .event_type == "decision"
                and .raw_payload.strategy_batch_id == $batch
                and .raw_payload.strategy_batch_output_index == $index
              )
            ' >"$root/decision.jsonl"
          gzip -cd "$other" |
            jq -c --arg batch "$batch_id" --argjson index "$output_index" '
              select(
                .event_type == "paper_decision_output_applied"
                and .raw_payload.strategy_batch_id == $batch
                and .raw_payload.strategy_batch_output_index == $index
              )
            ' >"$root/application.jsonl"
          test "$(wc -l <"$root/batch.jsonl")" = "1"
          test "$(wc -l <"$root/decision.jsonl")" = "1"
          test "$(wc -l <"$root/application.jsonl")" = "1"

          batch="$root/batch.jsonl"
          decision_ts="$(jq -r '.raw_payload.pipeline_input.decision_ts' "$batch")"
          emit_comparison() {
            field="$1"
            observed="$2"
            required="$3"
            if [ -z "$observed" ] || [ "$observed" = "null" ]; then
              jq -cn \
                --arg field "$field" \
                --arg required "$required" \
                '{kind:"comparison",field:$field,observed_ts:null,required_lte:$required,delta_ns:null,valid:true}'
              return
            fi
            observed_ns="$(date -u -d "$observed" +%s%N)"
            required_ns="$(date -u -d "$required" +%s%N)"
            delta_ns=$((observed_ns - required_ns))
            if [ "$delta_ns" -le 0 ]; then valid=true; else valid=false; fi
            jq -cn \
              --arg field "$field" \
              --arg observed "$observed" \
              --arg required "$required" \
              --argjson delta "$delta_ns" \
              --argjson valid "$valid" \
              '{kind:"comparison",field:$field,observed_ts:$observed,required_lte:$required,delta_ns:$delta,valid:$valid}'
          }
          max_timestamp() {
            maximum=""
            maximum_ns=""
            while IFS= read -r value; do
              [ -n "$value" ] || continue
              value_ns="$(date -u -d "$value" +%s%N)"
              if [ -z "$maximum_ns" ] || [ "$value_ns" -gt "$maximum_ns" ]; then
                maximum="$value"
                maximum_ns="$value_ns"
              fi
            done
            printf '%s' "$maximum"
          }

          fair_value_ts="$(jq -r '.raw_payload.pipeline_input.fair_value.computed_ts' "$batch")"
          reference_source_ts="$(jq -r '.raw_payload.pipeline_input.reference.source_ts' "$batch")"
          reference_local_ts="$(jq -r '.raw_payload.pipeline_input.reference.local_ts' "$batch")"
          book_max_ts="$(jq -r '.raw_payload.pipeline_input.books[]?.local_ts // empty' "$batch" | max_timestamp)"
          history_max_ts="$(jq -r '.raw_payload.pipeline_input.regime_feature_input.reference_history[]?.ts // empty' "$batch" | max_timestamp)"
          batch_recorded_ts="$(jq -r '.recorded_ts' "$batch")"
          decision_recorded_ts="$(jq -r '.recorded_ts' "$root/decision.jsonl")"
          application_recorded_ts="$(jq -r '.recorded_ts' "$root/application.jsonl")"
          {
            emit_comparison fair_value.computed_ts "$fair_value_ts" "$decision_ts"
            emit_comparison reference.source_ts "$reference_source_ts" "$decision_ts"
            emit_comparison reference.local_ts "$reference_local_ts" "$decision_ts"
            emit_comparison book.local_ts.max "$book_max_ts" "$decision_ts"
            emit_comparison reference_history.ts.max "$history_max_ts" "$decision_ts"
            emit_comparison decision_ts "$decision_ts" "$batch_recorded_ts"
            emit_comparison batch.recorded_ts "$batch_recorded_ts" "$decision_recorded_ts"
            emit_comparison decision.recorded_ts "$decision_recorded_ts" "$application_recorded_ts"
          } | while IFS= read -r line; do
            printf 'polyedge_chronology_scalar %s\n' "$line"
          done
          jq -cn \
            --arg batch_id "$batch_id" \
            --argjson output_index "$output_index" \
            --arg inventory "sha256:f74a9e80b5d7178ab811e9b7d3822985e334823917f43a0cccdcb15c2026a565" \
            '{kind:"identity",batch_id:$batch_id,output_index:$output_index,raw_source_inventory_sha256:$inventory}' |
            while IFS= read -r line; do
              printf 'polyedge_chronology_scalar %s\n' "$line"
            done
          SCRIPT
          )
          execution=$(az containerapp job start \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$VALIDATION_JOB" \
            --container-name lossdiag-validation \
            --image "$VALIDATION_IMAGE" \
            --cpu 2 \
            --memory 4Gi \
            --command /bin/sh \
            --args "-c" "$diagnostic_script" \
            --env-vars \
              APP_NAME=polyedge-shadow-chronology-diagnostic \
              EXECUTION_MODE=paper \
              ALLOW_LIVE=false \
              RUN_BOT_ON_STARTUP=false \
              ENABLE_TAKER_ORDERS=false \
              AZURE_CLIENT_ID="$AZURE_CLIENT_ID" \
            --query name -o tsv)
          test -n "$execution"
          echo "name=$execution" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Wait for read-only extraction
        env:
          EXECUTION_NAME: ${{ steps.execution.outputs.name }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            status=$(az containerapp job execution show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$VALIDATION_JOB" \
              --job-execution-name "$EXECUTION_NAME" \
              --query properties.status -o tsv)
            case "$status" in
              Succeeded) exit 0 ;;
              Failed|Stopped|Degraded) echo "Diagnostic execution reached $status" >&2; exit 1 ;;
              Running|Processing|"") sleep 15 ;;
              *) echo "Unknown diagnostic status: $status" >&2; exit 1 ;;
            esac
          done
          echo "Diagnostic execution exceeded fifteen minutes" >&2
          exit 1

      - name: Collect and verify scalar chronology evidence
        id: evidence
        env:
          EXECUTION_NAME: ${{ steps.execution.outputs.name }}
          TEMPLATE_SHA: ${{ steps.freeze.outputs.template_sha }}
        run: |
          set -euo pipefail
          workspace_id=$(az monitor log-analytics workspace show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --workspace-name log-polyedge-dev-6urdjr5nmwx7w \
            --query customerId -o tsv)
          for _ in $(seq 1 20); do
            az monitor log-analytics query \
              --workspace "$workspace_id" \
              --analytics-query "ContainerAppConsoleLogs_CL
                | where TimeGenerated > ago(1h)
                | where tostring(column_ifexists('ContainerGroupName_s', '')) contains '$EXECUTION_NAME'
                | extend Log=tostring(column_ifexists('Log_s', column_ifexists('Log', '')))
                | where Log startswith 'polyedge_chronology_scalar '
                | project TimeGenerated, Log
                | order by TimeGenerated asc" \
              -o json > scalar-logs.json
            test "$(jq 'length' scalar-logs.json)" = "9" && break
            sleep 15
          done
          test "$(jq 'length' scalar-logs.json)" = "9"
          jq -r '.[].Log | sub("^polyedge_chronology_scalar "; "")' scalar-logs.json |
            jq -s '
              {
                schema: "polyedge.shadow_chronology_diagnostic.v1",
                identity: (map(select(.kind == "identity")) | first | del(.kind)),
                comparisons: (map(select(.kind == "comparison")) | sort_by(.field)),
                invalid_fields: (map(select(.kind == "comparison" and (.valid | not))) | map(.field) | sort)
              }
            ' > chronology-diagnostic.json
          jq -e \
            --arg batch "$BATCH_ID" \
            --argjson index "$OUTPUT_INDEX" \
            --arg inventory "$EXPECTED_RAW_SOURCE_INVENTORY_SHA256" '
            .schema == "polyedge.shadow_chronology_diagnostic.v1"
            and .identity.batch_id == $batch
            and .identity.output_index == $index
            and .identity.raw_source_inventory_sha256 == $inventory
            and (.comparisons | length) == 8
            and ([.comparisons[].field] | unique | length) == 8
            and (.invalid_fields | length) >= 1
          ' chronology-diagnostic.json >/dev/null

          job=$(az containerapp job show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$VALIDATION_JOB" \
            -o json)
          after_sha="sha256:$(jq -cS \
            '{identity,configuration:.properties.configuration,template:.properties.template}' \
            <<<"$job" | sha256sum | cut -d' ' -f1)"
          test "$after_sha" = "$TEMPLATE_SHA"
          diagnostic_sha="sha256:$(sha256sum chronology-diagnostic.json | cut -d' ' -f1)"
          echo "diagnostic_sha=$diagnostic_sha" >> "$GITHUB_OUTPUT"
          jq '{identity,comparisons,invalid_fields}' chronology-diagnostic.json

      - name: Stop a failed diagnostic execution
        if: ${{ failure() && steps.execution.outputs.name != '' }}
        env:
          EXECUTION_NAME: ${{ steps.execution.outputs.name }}
        run: |
          status=$(az containerapp job execution show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$VALIDATION_JOB" \
            --job-execution-name "$EXECUTION_NAME" \
            --query properties.status -o tsv 2>/dev/null || true)
          case "$status" in
            Running|Processing|"")
              az containerapp job stop \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$VALIDATION_JOB" \
                --job-execution-name "$EXECUTION_NAME" \
                --only-show-errors -o none || true
              ;;
          esac

      - name: Upload scalar diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: polyedge-shadow-chronology-diagnostic
          path: chronology-diagnostic.json
          if-no-files-found: error
          retention-days: 7

      - name: Publish diagnostic summary
        env:
          DIAGNOSTIC_SHA: ${{ steps.evidence.outputs.diagnostic_sha }}
        run: |
          {
            echo "## Isolated July 23 chronology diagnostic"
            echo
            echo "- Execution: \`${{ steps.execution.outputs.name }}\`"
            echo "- Diagnostic: \`$DIAGNOSTIC_SHA\`"
            echo "- Invalid fields: \`$(jq -c '.invalid_fields' chronology-diagnostic.json)\`"
            echo "- Job template changed: **false**"
            echo "- Blob writes: **none**"
            echo "- Canonical campaign writes: **none**"
            echo "- Funded execution: **not present**"
          } >> "$GITHUB_STEP_SUMMARY"
